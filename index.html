<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Organizer | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">MailSnap</div>

            <div class="nav-group">
                <div class="nav-item active" data-category="All">📊 All Messages</div>
                <div class="nav-item" data-category="Shopping">🛍️ Shopping</div>
                <div class="nav-item" data-category="Tech">💻 Tech News</div>
                <div class="nav-item" data-category="Billing">💳 Payments</div>
                <div class="nav-item" data-category="Social">🤝 Social</div>
            </div>

            <div style="margin-top: auto; color: var(--text-dim); font-size: 0.8rem;">
                Mock Mode Active
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header class="header">
                <div>
                    <h1>Welcome Back, Bhai!</h1>
                    <p style="color: var(--text-dim)">Here are your organized emails.</p>
                </div>
                <input type="text" class="search-bar" placeholder="Search your snapshot...">
            </header>

            <div class="email-grid" id="email-grid">
                <!-- Emails will be injected here -->
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
