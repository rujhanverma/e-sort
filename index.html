<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailSnap | Organized Emails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">MailSnap</div>

            <div class="nav-group">
                <div class="nav-item active" data-category="All">📊 All Messages</div>
                <div class="nav-item" data-category="Shopping">🛍️ Shopping</div>
                <div class="nav-item" data-category="Tech">💻 Tech News</div>
                <div class="nav-item" data-category="Billing">💳 Payments</div>
                <div class="nav-item" data-category="Social">🤝 Social</div>
            </div>

            <div id="auth-buttons" style="margin-top: auto;">
                <button id="login-btn" onclick="handleAuthClick()" class="auth-btn">Connect Google</button>
                <button id="logout-btn" onclick="handleSignoutClick()" class="auth-btn"
                    style="display: none;">Disconnect</button>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header class="header">
                <div>
                    <h1 id="welcome-text">Welcome, Bhai!</h1>
                    <p id="status-text" style="color: var(--text-dim)">Please connect your Google account to see your
                        emails.</p>
                </div>
                <input type="text" class="search-bar" placeholder="Search your snapshot...">
            </header>

            <div class="email-grid" id="email-grid">
                <!-- Data will be injected here -->
                <div class="placeholder-msg">Click "Connect Google" to start organizing.</div>
            </div>
        </main>
    </div>

    <!-- App Logic -->
    <script src="auth.js"></script>
    <script src="api.js"></script>
    <script src="main.js"></script>
</body>

</html>
